<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Oxfraki Accessories Finder</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f7f9; margin:0; padding:40px; }
    .box { max-width:720px; margin:auto; background:white; padding:40px; border-radius:24px; box-shadow:0 8px 30px rgba(0,0,0,.08); }
    h1 { font-size:36px; margin-bottom:10px; }
    p { color:#555; font-size:18px; }
    input { width:100%; padding:16px; font-size:18px; border:1px solid #ddd; border-radius:12px; margin-top:20px; box-sizing:border-box; }
    button { margin-top:16px; padding:14px 24px; font-size:18px; border:0; border-radius:12px; background:#ff9900; color:white; font-weight:bold; cursor:pointer; }
    .result { margin-top:30px; padding:20px; background:#fff7e8; border-radius:16px; display:none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Oxfraki Accessories Finder</h1>
    <p>Find compatible replacement parts for your robot vacuum.</p>

    <input id="model" placeholder="Enter your model, e.g. L40 Ultra">
    <button onclick="searchModel()">Search</button>

    <div id="result" class="result"></div>
  </div>

  <script>
    function searchModel() {
      const model = document.getElementById('model').value.trim();
      const result = document.getElementById('result');

      if (!model) {
        result.style.display = 'block';
        result.innerHTML = 'Please enter your robot model.';
        return;
      }

      result.style.display = 'block';
      result.innerHTML = `
        <h2>Demo Result</h2>
        <p>You searched: <strong>${model}</strong></p>
        <p>Next step: connect this page to your Google Sheet.</p>
      `;
    }
  </script>
</body>
</html>
