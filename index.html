<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Oxfraki Accessories Finder — find compatible replacement parts for your robot vacuum model.">
  <title>Oxfraki Accessories Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="site-main">
    <div class="container">
      <header class="hero">
        <img
          class="hero__logo"
          src="images/logo.svg"
          alt="Oxfraki"
          width="180"
          height="42"
        >

        <h1 class="hero__title">Accessories Finder</h1>
        <p class="hero__subtitle">Find compatible accessories for your robot vacuum.</p>

        <form class="search-form" role="search" aria-label="Robot vacuum model search">
          <label class="visually-hidden" for="model-search">Robot vacuum model</label>
          <div class="search-form__group">
            <input
              class="search-form__input"
              type="search"
              id="model-search"
              name="model"
              placeholder="Enter your robot vacuum model..."
              autocomplete="off"
            >
            <button class="search-form__button" type="submit">Search</button>
          </div>
        </form>

        <section
          class="results"
          id="results"
          aria-label="Search results"
          aria-live="polite"
        ></section>
      </header>

      <section class="faq" aria-labelledby="faq-title">
        <h2 class="faq__title" id="faq-title">Can't find your model?</h2>
        <p class="faq__text">
          We're continuously adding support for new robot vacuum models.
          Please check back later.
        </p>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="site-footer__text">&copy; Oxfraki</p>
    </div>
  </footer>

  <script src="script.js?v=80"></script>
</body>
</html>
